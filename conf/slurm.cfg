# ~/.config/miniwdl.cfg
# Slurm HPC 集群配置文件
# 使用方法: miniwdl run single.wdl --cfg conf/slurm.cfg -i inputs/single.json

[core]
# 引擎允许同时运行的最大任务数
# 根据 Slurm 队列限制和集群资源调整
max_tasks = 16

[scheduler]
# 使用 Slurm 后端
backend = slurm

[task_runtime]
# 默认任务资源配置
# 如果 WDL 脚本中某 Task 未指定 runtime，使用此保底配置
defaults = {
        "docker": "docker.schema-bio.com/schemabio/germline:v0.0.3",
        "cpu": 4,
        "memory": "8G"
    }

# 以提交用户身份运行容器
as_user = true

[file_io]
# 工作目录根路径
# 指向高性能存储（如集群共享存储 /scratch 或 /data）
root = /scratch/germline

[download_cache]
# 公网文件缓存（可选）
# put = true
# get = true
# dir = /scratch/germline/cache

[slurm]
# Slurm 调度器配置

# sbatch 提交时的额外参数
# 示例：指定分区、账户、QOS 等
extra_sbatch_args = --partition=compute --qos=normal

# 是否在任务完成后保留输出文件
keep_job_output = true

# 任务输出目录（默认为工作目录下的 _logs）
# job_output_dir = /scratch/germline/logs

# Singularity 配置（如果集群使用 Singularity 而非 Docker）
use_singularity = true
singularity_image_dir = /scratch/images

# 资源请求映射
# 将 WDL runtime 资源映射到 Slurm 资源请求格式
# cpu_spec = --cpus-per-task={}
# memory_spec = --mem={}

# 环境变量传递
# 默认传递所有环境变量，可指定需要传递的变量
# export_vars = PATH,LD_LIBRARY_PATH,CONDA_PREFIX

# 任务状态轮询间隔（秒）
# poll_interval = 30

# 任务最大运行时间限制
# 可在 WDL runtime.time 中指定，或在此设置默认值
# default_time = 24:00:00