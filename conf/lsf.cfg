# ~/.config/miniwdl.cfg
# LSF (Load Sharing Facility) HPC 集群配置文件
# 使用方法: miniwdl run single.wdl --cfg conf/lsf.cfg -i inputs/single.json

[core]
# 引擎允许同时运行的最大任务数
# 根据 LSF 队列限制和集群资源调整
max_tasks = 16

[scheduler]
# 使用 LSF 后端
backend = lsf

[task_runtime]
# 默认任务资源配置
# 如果 WDL 脚本中某 Task 未指定 runtime，使用此保底配置
defaults = {
        "docker": "docker.schema-bio.com/schemabio/germline:v0.0.3",
        "cpu": 4,
        "memory": "8G"
    }

# 以提交用户身份运行容器
as_user = true

[file_io]
# 工作目录根路径
# 指向高性能存储（如集群共享存储）
root = /scratch/germline

[download_cache]
# 公网文件缓存（可选）
# put = true
# get = true
# dir = /scratch/germline/cache

[lsf]
# LSF 调度器配置

# bsub 提交时的额外参数
# 示例：指定队列、项目等
extra_bsub_args = -q compute -P germline

# 是否在任务完成后保留输出文件
keep_job_output = true

# 任务输出目录（默认为工作目录下的 _logs）
# job_output_dir = /scratch/germline/logs

# Singularity 配置（如果集群使用 Singularity 而非 Docker）
use_singularity = true
singularity_image_dir = /scratch/images

# 资源请求映射
# 将 WDL runtime 资源映射到 LSF 资源请求格式
# cpu_spec = -n {}
# memory_spec = -R "rusage[mem={}]"

# 环境变量传递
# export_vars = PATH,LD_LIBRARY_PATH,CONDA_PREFIX

# 任务状态轮询间隔（秒）
# poll_interval = 30

# 任务最大运行时间限制（分钟）
# 可在 WDL runtime.time 中指定，或在此设置默认值
# default_time = 1440

# LSF 队列资源字符串示例
# 对于需要特定资源的任务（如 GPU）
# gpu_spec = -R "select[ngpus>0] rusage[ngpus_shared=1]"